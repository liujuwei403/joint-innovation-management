<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · AI共创</title>
<link rel="stylesheet" href="style.css">
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; }
  .loading-wrap {
    display: flex; align-items: center; justify-content: center;
    height: 100%; flex-direction: column; gap: 12px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid rgba(127,90,240,0.2);
    border-top-color: #7f5af0;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-wrap p { color: #94a1b2; font-size: 14px; }
</style>
</head>
<body>
<div class="aurora-bg"></div>
<div class="loading-wrap" id="loading">
  <div class="spinner"></div>
  <p id="loading-msg">正在跳转登录...</p>
</div>

<script src="api.js"></script>
<script>
if (getCurrentUser()) {
  window.location.href = 'home.html';
} else {
  (async function() {
    const params = new URLSearchParams(window.location.search);
    const ssoToken = params.get('token');

    if (ssoToken) {
      document.getElementById('loading-msg').textContent = '正在验证身份...';
      history.replaceState({}, '', window.location.pathname);
      try {
        await handleSSOCallback(ssoToken);
      } catch(e) {
        document.getElementById('loading-msg').textContent = '登录失败: ' + e.message;
        setTimeout(() => { window.location.href = SSO_LOGIN_URL; }, 2000);
      }
    } else {
      window.location.href = SSO_LOGIN_URL;
    }
  })();
}
</script>
</body>
</html>
