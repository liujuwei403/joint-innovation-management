<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · AI共创</title>
<link rel="stylesheet" href="style.css">
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; }
  #sso-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; z-index: 999; display: none; }
  .loading-wrap {
    display: flex; align-items: center; justify-content: center;
    height: 100%; flex-direction: column; gap: 12px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid rgba(127,90,240,0.2);
    border-top-color: #7f5af0;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-wrap p { color: #94a1b2; font-size: 14px; }
</style>
</head>
<body>
<div class="aurora-bg"></div>
<div class="loading-wrap" id="loading">
  <div class="spinner"></div>
  <p id="loading-msg">正在跳转登录...</p>
</div>
<iframe id="sso-frame"></iframe>

<script src="api.js"></script>
<script>
// iframe 内：SSO 回调后通知父页面
if (window.self !== window.top) {
  var t = new URLSearchParams(window.location.search).get('token');
  if (t) window.parent.postMessage({type:'sso_token', token:t}, '*');
} else if (getCurrentUser()) {
  window.location.href = 'home.html';
} else {
  (async function() {
    var params = new URLSearchParams(window.location.search);
    var ssoToken = params.get('token');
    var isLogout = localStorage.getItem('sso_logout');

    if (isLogout) {
      // 退出后：SSO 可能自动回跳了，拦截 token，用 iframe 展示 SSO 登录页
      localStorage.removeItem('sso_logout');
      history.replaceState({}, '', window.location.pathname);
      document.getElementById('loading').style.display = 'none';
      var frame = document.getElementById('sso-frame');
      frame.src = SSO_LOGIN_URL;
      frame.style.display = 'block';

      window.addEventListener('message', async function(e) {
        if (e.data && e.data.type === 'sso_token') {
          frame.style.display = 'none';
          document.getElementById('loading').style.display = 'flex';
          document.getElementById('loading-msg').textContent = '正在验证身份...';
          try { await handleSSOCallback(e.data.token); }
          catch(err) { document.getElementById('loading-msg').textContent = '登录失败: ' + err.message; }
        }
      });

    } else if (ssoToken) {
      // 正常 SSO 回调
      document.getElementById('loading-msg').textContent = '正在验证身份...';
      history.replaceState({}, '', window.location.pathname);
      try { await handleSSOCallback(ssoToken); }
      catch(e) {
        document.getElementById('loading-msg').textContent = '登录失败: ' + e.message;
        setTimeout(function(){ window.location.href = SSO_LOGIN_URL; }, 2000);
      }

    } else {
      // 首次访问，跳 SSO
      window.location.href = SSO_LOGIN_URL;
    }
  })();
}
</script>
</body>
</html>
