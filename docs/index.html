<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · AI共创</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  html, body { height: 100%; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; }
  .card-wrap { position: relative; z-index: 10; width: 420px; }
  .card {
    background: rgba(26,25,50,0.85);
    backdrop-filter: blur(32px) saturate(150%);
    -webkit-backdrop-filter: blur(32px) saturate(150%);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-xl);
    padding: 44px 40px 36px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; }
  .logo-icon {
    width: 42px; height: 42px;
    background: #2a2d4a;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; color: #fffffe; }

  .sso-status {
    display: none; text-align: center; padding: 24px 0;
  }
  .sso-status .spinner {
    display: inline-block; width: 28px; height: 28px;
    border: 3px solid rgba(127,90,240,0.2);
    border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sso-status p { margin-top: 12px; color: var(--text-secondary); font-size: 14px; }

  .card-footer {
    margin-top: 24px; padding-top: 18px;
    border-top: 1px solid var(--border);
    text-align: center; font-size: 12px; color: var(--text-muted);
  }

  .btn-guest {
    background: transparent; border: 1px solid var(--glass-border);
    color: var(--text-muted); font-family: inherit; font-size: 14px;
    font-weight: 600; padding: 12px; border-radius: var(--radius-md);
    cursor: pointer; transition: all 0.25s;
  }
  .btn-guest:hover { background: rgba(255,255,255,0.06); color: var(--text-secondary); }

  /* Floating particles */
  .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .particle {
    position: absolute; border-radius: 50%;
    background: var(--accent); opacity: 0.1;
    animation: float linear infinite;
  }
  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.15; }
    90% { opacity: 0.15; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }
</style>
</head>
<body>
<div class="aurora-bg"></div>
<div class="particles" id="particles"></div>

<div class="card-wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-icon" style="background:linear-gradient(135deg,#1a1a3e,#2a2d5a);color:#d4a843;font-size:15px;font-weight:800;letter-spacing:1px">AI</div>
      <div class="logo-text">集团仓储管理部<br>AI共创</div>
    </div>

    <div id="sso-status" class="sso-status">
      <div class="spinner"></div>
      <p>正在验证身份...</p>
    </div>

    <div id="sso-buttons">
      <button class="btn btn-primary" style="width:100%" onclick="ssoLogin()">
        <span class="btn-text">公司账号登录</span>
      </button>
      <button class="btn btn-guest" style="width:100%;margin-top:10px" onclick="guestEnter()">
        <span class="btn-text">游客进入</span>
      </button>
      <div class="msg" id="msg-login"></div>
    </div>

    <div class="card-footer">使用公司SSO统一登录</div>
  </div>
</div>

<script src="api.js"></script>
<script>
// Particles
(function() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random() * 4 + 2;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*10}s;`;
    if (Math.random() > 0.5) p.style.background = 'var(--accent2)';
    c.appendChild(p);
  }
})();

if (getCurrentUser()) window.location.href = 'home.html';

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type + ' show';
}

function ssoLogin() {
  window.location.href = SSO_LOGIN_URL;
}

function guestEnter() {
  localStorage.setItem('badge_user', JSON.stringify({
    id: 'guest', account: 'guest', nickname: '游客', role: '游客'
  }));
  window.location.href = 'home.html';
}

// SSO 回调处理
(async function() {
  const params = new URLSearchParams(window.location.search);
  const ssoToken = params.get('token');
  if (!ssoToken) return;

  document.getElementById('sso-buttons').style.display = 'none';
  document.getElementById('sso-status').style.display = 'block';
  history.replaceState({}, '', window.location.pathname);

  try {
    await handleSSOCallback(ssoToken);
  } catch(e) {
    document.getElementById('sso-status').style.display = 'none';
    document.getElementById('sso-buttons').style.display = 'block';
    showMsg('msg-login', '登录失败: ' + e.message, 'error');
  }
})();
</script>
</body>
</html>
