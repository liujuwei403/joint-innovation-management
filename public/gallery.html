<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勋章墙 · AI共创</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .page-header { margin-bottom: 12px; animation: fadeSlideUp 0.5s ease; }
  .page-title { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; display: flex; align-items: center; gap: 12px; }
  .page-desc { color: var(--text-secondary); font-size: 14px; }
  .badge-total {
    font-size: 14px; font-weight: 600; padding: 4px 14px; border-radius: 14px;
    background: rgba(127,90,240,0.15); color: var(--accent-light);
  }

  /* ─── Gallery Tabs ─── */
  .gallery-tabs {
    display: flex; gap: 4px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
    border-radius: var(--radius-md); padding: 4px;
    margin-bottom: 24px; animation: fadeSlideUp 0.4s ease;
  }
  .gallery-tab {
    padding: 10px 28px; border: none; background: transparent;
    color: var(--text-muted); font-family: inherit; font-size: 14px;
    font-weight: 700; border-radius: 10px; cursor: pointer; transition: all 0.25s;
    display: flex; align-items: center; gap: 8px;
  }
  .gallery-tab.active { background: rgba(127,90,240,0.2); color: var(--accent-light); }
  .gallery-tab:hover:not(.active) { color: var(--text-secondary); }
  .gallery-panel { display: none; animation: fadeSlideUp 0.3s ease; }
  .gallery-panel.active { display: block; }

  .toolbar {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    margin-bottom: 24px; animation: fadeSlideUp 0.55s ease;
  }

  .badge-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px; animation: fadeSlideUp 0.65s ease;
  }

  .mini-stat {
    background: var(--bg-card); border: 1px solid var(--glass-border);
    border-radius: var(--radius-md); padding: 16px; text-align: center;
  }
  .mini-stat-num { font-size: 24px; font-weight: 800; color: var(--accent-light); }
  .mini-stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .skeleton-card { height: 200px; border-radius: var(--radius-lg); }

  /* 全员勋章 .member-badge-grid 样式已移至 style.css（与 admin.html 共用） */

  @media (max-width: 640px) {
    .badge-grid { grid-template-columns: repeat(2, 1fr); }
    .page-title { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="aurora-bg"></div>

<div class="app-shell">
<aside class="sidebar">
  <div class="sidebar-brand"><span class="sidebar-brand-icon"></span><span>集团仓储管理部<br>AI共创</span></div>
  <div class="sidebar-nav">
    <a class="sidebar-link" href="home.html"><span class="sidebar-link-icon icon-gold">🏠</span><span>首页</span></a>
    <a class="sidebar-link active" href="gallery.html"><span class="sidebar-link-icon">🏅</span><span>勋章墙</span></a>
    <a class="sidebar-link" href="calendar.html"><span class="sidebar-link-icon">📅</span><span>共创日历</span></a>
    <a class="sidebar-link" href="achievements.html"><span class="sidebar-link-icon">🏆</span><span>共创成果</span></a>
    <a class="sidebar-link" href="wishes.html"><span class="sidebar-link-icon">🌟</span><span>许愿池</span></a>
    <a class="sidebar-link admin-link" href="admin.html" id="admin-tab"><span class="sidebar-link-icon icon-gold">⚙️</span><span>管理后台</span></a>
  </div>
</aside>
<div class="main-area">
<div class="topbar">
  <div class="topbar-right">
    <span class="topbar-user" id="nav-user"></span>
    <button class="topbar-btn" onclick="logout()">退出</button>
  </div>
</div>

<div class="container">
  <div class="gallery-tabs">
    <button class="gallery-tab active" onclick="switchGalleryTab('mine',this)">🏅 我的勋章 <span class="badge-total" id="badge-total">-</span></button>
    <button class="gallery-tab" onclick="switchGalleryTab('all',this)">👥 全员勋章</button>
  </div>

  <!-- 我的勋章 -->
  <div id="panel-mine" class="gallery-panel active">
    <div id="contrib-stats" class="stats-row" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin-bottom:20px;animation:fadeSlideUp 0.55s ease"></div>

    <div class="toolbar">
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterBadges('all',this)">全部</button>
        <button class="filter-btn" onclick="filterBadges('earned',this)">已获得</button>
        <button class="filter-btn" onclick="filterBadges('locked',this)">未获得</button>
      </div>
    </div>

    <div id="badge-wall" class="badge-grid">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
  </div>

  <!-- 全员勋章 -->
  <div id="panel-all" class="gallery-panel">
    <div class="member-sort-bar">
      <span>排序方式：</span>
      <button class="filter-btn active" onclick="sortAllMembers('earned',this)">成就勋章数</button>
      <button class="filter-btn" onclick="sortAllMembers('total',this)">贡献分</button>
    </div>
    <div id="all-members-content">
      <div class="skeleton" style="height:120px;border-radius:14px;margin-bottom:12px"></div>
      <div class="skeleton" style="height:120px;border-radius:14px;margin-bottom:12px"></div>
      <div class="skeleton" style="height:120px;border-radius:14px"></div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
const user = getCurrentUser();
if (!user) window.location.href = 'index.html';
else {
  document.getElementById('nav-user').textContent = user.nickname;
  if (user.role === '管理员') document.getElementById('admin-tab').style.display = 'flex';
  loadBadgeWall();
}

let achievementData = { earned: [], locked: [] };
let userContributions = {};
let myManualAwards = [], badgeMapData = {};
let allUsersData = [], allAwardsData = [], allActivities = [], allSkillsData = [], allPartnersData = [], allWebAppsData = [], allWishesData = [];
let allMembersData = [];
let currentMemberSort = 'earned';

async function loadBadgeWall() {
  try {
    const [activities, skills, partners, webApps, wishes, badges, awards, users] = await Promise.all([
      teableGet(TABLE_CALENDAR),
      teableGet(TABLE_SKILLS),
      teableGet(TABLE_PARTNERS),
      teableGet(TABLE_WEB),
      teableGet(TABLE_WISH),
      teableGet(TABLE_BADGE),
      teableGet(TABLE_AWARD),
      teableGet(TABLE_USER),
      loadAchievementConfig(),
      loadAchievementImages(),
    ]);
    allUsersData = users; allAwardsData = awards;
    allActivities = activities; allSkillsData = skills; allPartnersData = partners; allWebAppsData = webApps; allWishesData = wishes;

    // 手动授予的勋章
    badgeMapData = {};
    badges.forEach(b => { badgeMapData[b.fields['名称']] = b; });

    if (user.role === '游客') {
      myManualAwards = [];
      userContributions = { sharer: 0, skills: 0, partners: 0, web: 0, agent: 0, wish: 0 };
    } else {
      myManualAwards = awards.filter(a => a.fields['账号'] === user.account);
      userContributions = computeUserContributions(user.account, user.nickname, activities, skills, partners, webApps, wishes);
    }
    achievementData = generateAchievementBadges(userContributions);

    const totalAch = ACHIEVEMENT_BADGES.length * ACHIEVEMENT_TIERS.length;
    const totalEarned = achievementData.earned.length + myManualAwards.length;
    document.getElementById('badge-total').textContent =
      `${totalEarned} / ${totalAch + badges.length}`;

    // 渲染贡献统计条
    const statsEl = document.getElementById('contrib-stats');
    statsEl.innerHTML = ACHIEVEMENT_BADGES.map(b => {
      const count = userContributions[b.key] || 0;
      const tier = getAchievedTier(count);
      return `<div class="mini-stat">
        <div style="font-size:24px;margin-bottom:4px">${b.icon}</div>
        <div class="mini-stat-num">${count}</div>
        <div class="mini-stat-label">${b.name}${tier ? ` · ${tier.name}` : ''}</div>
      </div>`;
    }).join('');

    renderWall('all');
    buildAllMembers();
    sortAllMembers(currentMemberSort);
  } catch(e) {
    console.error(e);
    document.getElementById('badge-wall').innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">⚠️</div><p>加载失败，请刷新重试</p></div>';
  }
}

function switchGalleryTab(tab, el) {
  document.querySelectorAll('.gallery-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.gallery-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(tab === 'mine' ? 'panel-mine' : 'panel-all').classList.add('active');
}

function filterBadges(filter, el) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderWall(filter);
}

function renderWall(filter) {
  const container = document.getElementById('badge-wall');
  let html = '';

  if (filter === 'all' || filter === 'earned') {
    achievementData.earned.forEach(b => { html += renderAchievementCard(b); });
    myManualAwards.forEach(a => { html += renderBadgeCard(a, badgeMapData); });
  }
  if (filter === 'all' || filter === 'locked') {
    achievementData.locked.forEach(b => { html += renderLockedAchievementCard(b); });
    const earnedNames = new Set(myManualAwards.map(a => a.fields['勋章名称']));
    Object.values(badgeMapData).forEach(b => {
      if (!earnedNames.has(b.fields['名称'])) html += renderLockedBadgeCard(b);
    });
  }

  if (!html) {
    const msg = filter === 'earned' ? '还没有获得勋章，继续加油！' : '恭喜，已获得全部勋章！';
    const icon = filter === 'earned' ? '🎯' : '🎉';
    html = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">${icon}</div><p>${msg}</p></div>`;
  }
  container.innerHTML = html;
}

// ─── 全员勋章 ───────────────────────────────────────────
function buildAllMembers() {
  const activeUsers = allUsersData.filter(u => u.fields['状态'] === '已激活');
  allMembersData = activeUsers.map(u => {
    const account = u.fields['账号'];
    const nickname = u.fields['昵称'];
    const manualAwards = allAwardsData.filter(a => a.fields['账号'] === account);
    const manualScore = manualAwards.reduce((sum, a) => {
      const b = badgeMapData[a.fields['勋章名称']];
      return sum + (b?.fields['价值分'] || 0);
    }, 0);
    const contributions = computeUserContributions(account, nickname, allActivities, allSkillsData, allPartnersData, allWebAppsData, allWishesData);
    const achievements = generateAchievementBadges(contributions);
    const totalContrib = contributions.sharer + contributions.skills + contributions.partners + contributions.web + contributions.agent + (contributions.wish || 0) + manualScore;
    return { account, nickname, manualAwards, achievements, contributions, manualScore, totalContrib, earnedCount: achievements.earned.length, badgeMap: badgeMapData };
  });
}

function sortAllMembers(sortBy, el) {
  currentMemberSort = sortBy;
  if (el) {
    document.querySelectorAll('.member-sort-bar .filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }
  renderAllMembersInto('all-members-content', allMembersData, sortBy);
  bindMemberGridScroll('all-members-content');
}
</script>
</div><!-- /main-area -->
</div><!-- /app-shell -->
</body>
</html>
